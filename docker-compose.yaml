# Coolify: Base Directory /, Compose Location /docker-compose.yaml, branch main
services:
  sunblinds:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
    environment:
      NODE_ENV: production
      PORT: "3000"
      HOSTNAME: 0.0.0.0
      # Nastavte v Coolify → Environment Variables:
      # SESSION_SECRET=
      # ADMIN_PASSWORD=
      # NEXT_PUBLIC_SITE_URL=https://vase-domena.cz
    volumes:
      - cms-data:/app/data/cms
      - uploads:/app/public/uploads

volumes:
  cms-data:
  uploads:
