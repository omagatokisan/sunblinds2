<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font: 13px/1.45 'Google Sans', Roboto, Arial, sans-serif;
    color: #202124;
    background: #f8f9fa;
  }
  #app { padding: 12px; padding-bottom: 24px; }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 10px;
  }
  .topbar h1 { font-size: 16px; font-weight: 600; }
  .topbar-actions { display: flex; gap: 6px; }

  .stats {
    display: flex; gap: 8px; margin-bottom: 12px;
  }
  .stat {
    flex: 1; background: #fff; border: 1px solid #dadce0;
    border-radius: 8px; padding: 8px 10px; text-align: center;
  }
  .stat-val { display: block; font-size: 18px; font-weight: 600; color: #1a73e8; }
  .stat-lbl { font-size: 10px; color: #5f6368; text-transform: uppercase; }

  .panel {
    background: #fff; border: 1px solid #dadce0; border-radius: 8px;
    margin-bottom: 10px; overflow: hidden;
  }
  .panel-head {
    padding: 10px 12px; font-weight: 600; cursor: pointer;
    display: flex; justify-content: space-between; user-select: none;
    background: #fff;
  }
  .panel-head:hover { background: #f1f3f4; }
  .panel-body { padding: 0 12px 12px; border-top: 1px solid #eee; }
  .panel-body.collapsed { display: none; }
  .chevron { font-size: 10px; color: #5f6368; }

  .field { display: block; margin-top: 10px; }
  .field > span {
    display: block; font-size: 11px; font-weight: 500;
    color: #5f6368; margin-bottom: 4px;
  }
  .field input, .field select, .field textarea {
    width: 100%; padding: 8px 10px; border: 1px solid #dadce0;
    border-radius: 6px; font: inherit; background: #fff;
  }
  .field input:focus, .field select:focus, .field textarea:focus {
    outline: none; border-color: #1a73e8; box-shadow: 0 0 0 2px rgba(26,115,232,.15);
  }
  .field.check { display: flex; align-items: center; gap: 8px; }
  .field.check span { margin: 0; }
  .field-row { display: flex; gap: 8px; margin-top: 10px; }
  .flex1 { flex: 1; margin-top: 0 !important; }

  .chips { flex-wrap: wrap; gap: 6px; }
  .chip {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 11px; padding: 4px 8px; background: #f1f3f4;
    border-radius: 999px; cursor: pointer;
  }
  .chip input { width: auto; }

  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  .btn {
    border: none; border-radius: 6px; padding: 8px 14px;
    font: inherit; font-weight: 500; cursor: pointer;
  }
  .btn:disabled { opacity: .5; cursor: not-allowed; }
  .btn-primary { background: #1a73e8; color: #fff; }
  .btn-primary:hover:not(:disabled) { background: #1765cc; }
  .btn-secondary { background: #e8f0fe; color: #1a73e8; flex: 1; }
  .btn-ghost { background: transparent; color: #5f6368; padding: 6px 10px; }
  .btn-danger { background: #fce8e6; color: #c5221f; }
  .btn-sm { padding: 5px 10px; font-size: 12px; background: #f1f3f4; }
  .btn-import { display: inline-block; cursor: pointer; }

  .toolbar {
    display: flex; flex-wrap: wrap; align-items: center; gap: 6px;
    margin-bottom: 8px; font-size: 12px;
  }
  .select-all { display: flex; align-items: center; gap: 4px; }
  .bulk-select { padding: 4px 6px; border-radius: 4px; border: 1px solid #dadce0; font-size: 12px; }

  .list { display: flex; flex-direction: column; gap: 8px; }
  .empty { text-align: center; color: #5f6368; padding: 24px; }

  .card {
    background: #fff; border: 1px solid #dadce0; border-radius: 8px;
    padding: 10px 12px; position: relative;
  }
  .card.selected { border-color: #1a73e8; background: #e8f0fe; }
  .card-head { display: flex; align-items: flex-start; gap: 8px; }
  .card-check { margin-top: 3px; }
  .card-main { flex: 1; min-width: 0; }
  .card-name {
    font-weight: 600; font-size: 14px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .card-meta { font-size: 12px; color: #5f6368; margin-top: 2px; }
  .card-price { color: #137333; font-weight: 600; }
  .card-desc {
    font-size: 12px; color: #3c4043; margin-top: 6px;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .badge {
    display: inline-block; font-size: 10px; font-weight: 600;
    padding: 2px 8px; border-radius: 999px; text-transform: uppercase;
    margin-left: 6px; vertical-align: middle;
  }
  .badge-new { background: #e8f0fe; color: #1a73e8; }
  .badge-contacted { background: #fef7e0; color: #ea8600; }
  .badge-quoted { background: #e6f4ea; color: #137333; }
  .badge-won { background: #137333; color: #fff; }
  .badge-lost { background: #fce8e6; color: #c5221f; }
  .badge-on-hold { background: #f1f3f4; color: #5f6368; }

  .card-actions {
    display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px;
  }
  .card-actions button {
    font-size: 11px; padding: 4px 8px; border: 1px solid #dadce0;
    background: #fff; border-radius: 4px; cursor: pointer;
  }
  .card-actions button:hover { background: #f1f3f4; }
  .card-actions .danger { color: #c5221f; border-color: #f5c6c4; }

  .modal { position: fixed; inset: 0; z-index: 100; display: flex; align-items: center; justify-content: center; }
  .modal.hidden { display: none; }
  .modal-backdrop { position: absolute; inset: 0; background: rgba(0,0,0,.35); }
  .modal-box {
    position: relative; background: #fff; border-radius: 12px;
    width: calc(100% - 24px); max-width: 380px; max-height: 90vh;
    overflow-y: auto; box-shadow: 0 8px 28px rgba(0,0,0,.2);
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-bottom: 1px solid #eee;
  }
  .modal-head h2 { font-size: 15px; }
  .icon-btn {
    border: none; background: none; font-size: 22px; cursor: pointer; color: #5f6368;
  }
  #leadForm { padding: 12px 16px 16px; }
  .modal-foot { display: flex; justify-content: flex-end; gap: 8px; margin-top: 12px; }
  .form-errors {
    background: #fce8e6; color: #c5221f; padding: 8px 10px;
    border-radius: 6px; font-size: 12px; margin-top: 10px;
  }
  .form-errors.hidden { display: none; }

  .toast {
    position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
    background: #323232; color: #fff; padding: 10px 16px; border-radius: 8px;
    font-size: 13px; z-index: 200; max-width: 90%;
  }
  .toast.hidden { display: none; }
</style>
